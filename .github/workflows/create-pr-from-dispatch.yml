name: Create PR from Sync Dispatch

on:
  repository_dispatch:
    types: [create-pr]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Open PR for synced branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          # Only branches created by the internal sync workflow are accepted.
          # Those are always named: sync/<source_branch>-<YYYYmmdd-HHMMSS>
          if [[ ! "$BRANCH" =~ ^sync/[a-zA-Z0-9_/-]+-[0-9]{8}-[0-9]{6}$ ]]; then
            echo "❌ Rejected: branch name '$BRANCH' does not match the expected pattern sync/<name>-<YYYYmmdd-HHMMSS>."
            echo "PRs can only be opened for branches created by the internal sync workflow."
            exit 1
          fi
          echo "✅ Branch name validated: $BRANCH"

      - name: Checkout synced branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch }}
          fetch-depth: 0

      - name: Verify branch is ahead of main
        env:
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" -eq 0 ]; then
            echo "❌ Branch '$BRANCH' has no commits ahead of main — nothing to PR."
            exit 1
          fi
          echo "✅ Branch is $AHEAD commit(s) ahead of main."

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.client_payload.branch }}
          TITLE: ${{ github.event.client_payload.title }}
          BODY: ${{ github.event.client_payload.body }}
        run: |
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
